<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MERNa Web</title>
	<style>
		#urlInput {
            width: 500px; 
            padding: 10px;
            font-size: 14px;
        }
        #favoritePlacesJSON, #batmanJSON {
            padding: 20px;
            background-color: lightgray;
            margin-top: 20px;
        }
		#testingDiv {
            display: none;
        }
    </style>
</head>
<body>
	<h1>Health Insurance Risk Calculator</h1>
	

	<label for="urlInput">Server test:</label><br />

	<button onclick="testServerConnection()">Test Server Connection</button>
	<div id="ping"></div><br /><br />
	<div id="testingDiv">
	<script>
		async function testServerConnection() {
			const pingField = document.getElementById("ping");
			pingField.innerHTML = "";
			var div = document.getElementById('testingDiv');
			div.style.display = 'none';

			const url = "https://health-insurance-risk-calculator-nick.azurewebsites.net/test"
			const response = await fetch(url);
			const pingResponse = await response.text();

			if (pingResponse === 'This is the test response.') {
				pingField.innerHTML = "Success!";
				var div = document.getElementById('testingDiv');
				div.style.display = 'block';
			} 
		}
	</script>

	</div>
</body>
</html>
