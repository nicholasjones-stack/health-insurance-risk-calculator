<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MERNa Web</title>
	<style>
		#urlInput {
            width: 500px; 
            padding: 10px;
            font-size: 14px;
        }
        #favoritePlacesJSON, #batmanJSON {
            padding: 20px;
            background-color: lightgray;
            margin-top: 20px;
        }
		#testingDiv {
            display: none;
        }
    </style>
</head>
<body>
	<h1>Health Insurance Risk Calculator</h1>



	<select id="systolic">
		<option>&lt;120</option>
		<option>120-129</option>
		<option>130-139</option>
		<option>140-179</option>
		<option>&gt;180</option>
	</select> +

	<select id="diastolic">
		<option>&lt;80</option>
		<option>80-89</option>
		<option>90-119</option>
		<option>&gt;120</option>
	</select>
	<input id="category" disabled></input>

	<br>
	<button type="button" onclick="calculateBP()">Calculate BP</button>
	<div id="category"></div>
	<br><br>

	<input id="weight">weight</input>
	<br>
	<input id="feet">feet</input>
	<br>
	<input id="inches">inches</input>
	<br>
	<input id="bmiCategory" disabled></input>
	<button type="button" onclick="calculateBMI()">Calculate BMI</button>
	<div id="bmiCategory"></div>

	<br>
	<br>
	<input id="age">age</input>
	<br>
	<br>


	<div>
	<input type="checkbox" id="diabetes">
    <label for="diabetes">Diabetes</label>
	<input type="checkbox" id="cancer">
    <label for="cancer">Cancer</label>
	<input type="checkbox" id="alzheimer">
    <label for="alzheimer">Alzheimer's</label>
	</div>

	<br>
	<br>
	<input id="risk" disabled></input>
	<button type="button" onclick="calculateRisk()">Calculate Risk</button>
	<div id="risk"></div>
	
	

	<script>

		async function calculateBMI(){
			const weight = document.getElementById("weight").value
			const feet = document.getElementById("feet").value
			const inches = document.getElementById("inches").value

			const url = "https://health-insurance-risk-calculator-nick.azurewebsites.net/"
			const fetchString = url+"/calculate-bmi?feet="+feet+"&inches="+inches+"&weight="+weight
			const response = await fetch(fetchString)
			const responseText = await response.text()
			document.getElementById("bmiCategory").value = responseText
			const bmiCategory = responseText
		}

		async function calculateBP(){
			const systolic = document.getElementById("systolic").value
			const diastolic = document.getElementById("diastolic").value

			let s = 0
			let d = 0
			if (systolic == "<120")		
				s = 1
			else if (systolic == "120-129")
				s = 2
			else if (systolic == "130-139")
				s = 3
			else if (systolic == "140-179")
				s = 4
			else if (systolic == ">180")
				s = 5

			if (diastolic == "<80")
				d = 1
			else if (diastolic == "80-89")
				d = 2
			else if (diastolic == "90-119")
				d = 3
			else if (diastolic == ">120")
				d = 4
			

			const url = "https://health-insurance-risk-calculator-nick.azurewebsites.net/"
			const fetchString = url+"/calculate-bp?systolic="+s+"&diastolic="+d
			const response = await fetch(fetchString)
			const responseText = await response.text()
			document.getElementById("category").value = responseText
			const category = responseText
		}

		async function calculateRisk(){

			const age = document.getElementById("age").value
			const diabetes = document.getElementById("diabetes").checked
			const alzheimer = document.getElementById("alzheimer").checked
			const cancer = document.getElementById("cancer").checked
			const bmiCategory = document.getElementById("bmiCategory").value
			const bpCategory = document.getElementById("category").value
			console.log(age + " " + diabetes + " " + alzheimer + " " + cancer + " " + bmiCategory + " " + bpCategory)

			let history = 0
			if (diabetes)
				history += 1
			if (alzheimer)
				history += 1
			if (cancer)
				history += 1

			let bmi = 0
			if (bmiCategory == "obese")
				bmi = 2
			else if (bmiCategory == "overweight")
				bmi = 1
			else
				bmi = 0

			let bp = 0
			if (bpCategory == "crisis")
				bp = 4
			else if (bpCategory == "stage2")
				bp = 3
			else if (bpCategory == "stage1")
				bp = 2
			else if (bpCategory == "elevated")
				bp = 1
			else
				bp = 0

			const url = "https://health-insurance-risk-calculator-nick.azurewebsites.net/"
			const fetchString = url+"/risk-category?age="+age+"&disease="+history+"&bmi="+bmi+"&bp="+bp
			const response = await fetch(fetchString)
			const responseText = await response.text()
			document.getElementById("risk").value = responseText
		}

		async function testServerConnection() {
			const pingField = document.getElementById("ping");
			pingField.innerHTML = "";
			var div = document.getElementById('testingDiv');
			div.style.display = 'none';

			const url = "https://health-insurance-risk-calculator-nick.azurewebsites.net/test"
			const response = await fetch(url);
			const pingResponse = await response.text();

			if (pingResponse === 'This is the test response.') {
				pingField.innerHTML = "Success!";
				var div = document.getElementById('testingDiv');
				div.style.display = 'block';
			} 
		}

	</script>

	</div>
</body>
</html>
